<div *ngIf="showReadingLists && courses.length > 0"
     class="full-view-section readingListCitations"
     id="full-view-section-courseReadingLists"
     tabindex="-1">
    <div class="full-view-section-content">
        <div class="section-head">
            <div class="layout-row layout-align-center-center">
                <h4 class="section-title light-text">Course reading lists</h4>
                <div class="md-divider"></div>
            </div>
        </div>
        <div class="section-body">
            <ul class="course-resource-list">
                <li *ngFor="let course of courses">
                    <a [href]="course.url"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="button-as-link link-alt-color">
                        <span>{{ course.displayName }}</span>
                        <svg width="18" height="18" viewBox="0 0 24 24"
                             style="margin-left: 4px; vertical-align: middle;">
                            <path d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z"
                                  fill="currentColor"></path>
                        </svg>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
